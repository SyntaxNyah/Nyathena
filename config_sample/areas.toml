[[Area]]
# Sets the name of the area.
name = "Lobby"

# Sets a short description shown to players when they enter the area.
# Leave blank for no description.
description = ""

# Sets the area's default background. This must be in the server's background list.
background = "gs4"

# Sets the area's default evidence mode. Permitted options are "any", "cms", and "mods".
# "any" allows all users to alter evidence. "cms" only allows area CMs to alter evidence. "mods" only allows moderators to alter evidence.
evidence_mode = "mods"

# Sets whether iniswapping is allowed in the area.
allow_iniswap = false

# Sets whether users are allowed to become 'CM' in this area.
allow_cms = false

# Sets whether non-interrupting preanims are forced in this area.
force_nointerrupt = true

# Sets whether the server's background list is enforced in this area.
force_bglist = true

# Sets whether the background in this area cannot be changed.
lock_bg = true

# Sets whether non-CM users are prevented from playing music in this area.
lock_music = false

# Mirror mode: when true, every IC message broadcast in this area is reversed
# server-side. Staff can also toggle this at runtime. Default false (off).
# mirror = false

# Punishment area: when true, every IC message sent in this area has a random,
# one-shot punishment effect applied to it (uwu, pirate, morse, dreamsequence,
# monkey sounds, etc.). Nothing is persisted — the effect clears the instant
# the speaker leaves the area. If the translator punishment is configured
# server-wide (enable_translator_punishment + translator_api_key in config.toml),
# it is also included in the random pool. Staff can toggle at runtime.
# punishment_area = false

[[Area]]
name = "Courtroom"
background = "gs4"
evidence_mode = "cms"
allow_iniswap = true
allow_cms = true
force_nointerrupt = false
force_bglist = true
lock_bg = false
lock_music = false
