[Server]
# The address to listen on. Leave blank to listen on any. If you don't know what you're doing, leave this blank.
addr = ""

# The port to listen for connections on.
port = 27016

# The hostname or IP address to advertise to the master server.
# If left blank, the master server will use the IP address from which the advertisement request is received.
# Set this to your public hostname (e.g., "hatsune.miku.pizza") or IP address if the detected IP is not correct
# (e.g., when behind NAT, using port forwarding, or when the server should be accessed via a specific domain).
advertise_hostname = ""

# Whether to listen for websocket (WebAO) connections.
enable_webao = false

# The port to listen for websocket (WebAO) connections on.
webao_port = 27017

# Whether to listen for secure websocket (WebAO over WSS) connections.
enable_webao_secure = false

# The port to listen for secure websocket (WebAO over WSS) connections on.
# Typically port 443 when using Cloudflare or other reverse proxies.
webao_secure_port = 443

# Path to TLS certificate file (optional - leave empty if using a reverse proxy like Cloudflare).
# When both tls_cert_path and tls_key_path are provided, the server will handle TLS directly.
# When empty, the server listens on plain HTTP and expects a reverse proxy to handle TLS termination.
tls_cert_path = ""

# Path to TLS private key file (optional - leave empty if using a reverse proxy like Cloudflare).
tls_key_path = ""

# Set to true if running behind a reverse proxy (nginx, Apache, etc.)
# When enabled, the master server will advertise the external ports instead of internal listening ports
reverse_proxy_mode = false

# External HTTP port exposed by reverse proxy (only used when reverse_proxy_mode = true)
# This is the port clients connect to, not the internal listening port
reverse_proxy_http_port = 80

# External HTTPS port exposed by reverse proxy (only used when reverse_proxy_mode = true)
# This is the port clients connect to, not the internal listening port
reverse_proxy_https_port = 443

# Example nginx configuration for reverse proxy setup:
# When using reverse_proxy_mode, configure Athena to listen on an internal port (e.g., 3141)
# and nginx to forward from external ports (80/443) to that internal port.
# 
# IMPORTANT: Both webao_port and webao_secure_port should be set to the SAME internal port (3141)
# because nginx handles the external port routing (80 and 443) and forwards both to this single
# internal port. Athena doesn't need separate ports since nginx performs the port demultiplexing.
#
# server {
#     listen 80;
#     server_name hatsune.miku.pizza;
#     
#     location / {
#         proxy_pass http://localhost:3141;
#         proxy_http_version 1.1;
#         proxy_set_header Upgrade $http_upgrade;
#         proxy_set_header Connection "Upgrade";
#         proxy_set_header Host $host;
#         proxy_set_header X-Real-IP $remote_addr;
#         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#         proxy_set_header X-Forwarded-Proto $scheme;
#     }
# }
#
# server {
#     listen 443 ssl;
#     server_name hatsune.miku.pizza;
#     
#     ssl_certificate /path/to/cert.pem;
#     ssl_certificate_key /path/to/key.pem;
#     
#     location / {
#         proxy_pass http://localhost:3141;
#         proxy_http_version 1.1;
#         proxy_set_header Upgrade $http_upgrade;
#         proxy_set_header Connection "Upgrade";
#         proxy_set_header Host $host;
#         proxy_set_header X-Real-IP $remote_addr;
#         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#         proxy_set_header X-Forwarded-Proto $scheme;
#     }
# }
#
# With this setup, set:
#   enable_webao = true
#   webao_port = 3141                    # Internal port - where Athena actually listens
#   enable_webao_secure = true
#   webao_secure_port = 3141             # Same internal port - nginx routes both 80 and 443 here
#   tls_cert_path = ""                   # Empty - nginx handles TLS termination
#   tls_key_path = ""                    # Empty - nginx handles TLS termination
#   reverse_proxy_mode = true            # Enable reverse proxy mode
#   reverse_proxy_http_port = 80         # External port - what clients see for HTTP
#   reverse_proxy_https_port = 443       # External port - what clients see for HTTPS
#
# The master server will then advertise:
#   ws://hatsune.miku.pizza:80
#   wss://hatsune.miku.pizza:443

# The name of your server. This is used both on the server list, and within the server.
name = "Unnamed Server"

# The description of your server.
description = "A brand new server!"

# Sets the server's message of the day (MoTD)
# This is sent to every player when they first join the server, or with /motd.
motd = "Welcome to my server!"

# The maximum amount of players who can join the server at once.
max_players = 100

# The maximum amount of bytes that players can send in a message. Long messages can slow down clients, 
# so don't make this too large.
max_message_length = 256

# Sets the detault length of bans.
# This must be a number followed by a unit. Example: "3w" - three weeks.
# Valid units are "s" (second), "m" (minute), "h" (hour), "d" (day), "w" (week).
default_ban_duration = "3d"

# Sets the number of client connections that can be made from the same IP, also known as "multiclienting".
# Set to 0 to disable multiclient limiting.
multiclient_limit = 16

# Sets the URL for the server's WebAO assets.
# If this is blank, vanilla assets will be used.
# The URL should include the protocol (e.g., "https://example.com/assets").
asset_url = ""

# Sets the URL for the server's Discord webhook.
# If this is blank, the discord webhook will be disabled.
# To setup the webhook, follow the instructions here (https://support.discord.com/hc/en-us/articles/228383668-Intro-to-Webhooks)
# and set this to the URL of your webhook.
webhook_url = ""

# Sets the Discord role ID to ping via the webhook when a modcall is received.
# Right-click the role in Server Settings > Roles and select "Copy Role ID" (requires Developer Mode).
# If this is blank, no role will be pinged.
webhook_ping_role_id = ""

# Sets the URL for the punishment (ban/kick) Discord webhook.
# If set, a detailed embed will be posted to this webhook channel whenever a moderator
# bans or kicks a player. The embed includes: IC name, OOC name, IPID, Ban ID (bans only),
# duration (bans only), reason, and the moderator who issued the punishment.
# Leave blank to disable punishment webhook logging.
punishment_webhook_url = ""

# Sets the maximum number of dice that can be rolled at once.
max_dice = 100

# Sets the maximum number of sides a rolled dice can have.
max_side = 100

# Sets the maximum number of statements a recorded testimony can contain.
max_testimony = 10

# Rate limiting: Maximum number of messages (IC, OOC, music) a player can send within the time window.
# Players who exceed this limit will be automatically kicked from the server.
# This helps prevent spam and resource exhaustion. Set to 0 to disable rate limiting.
# Default: 20 messages
message_rate_limit = 20

# Rate limiting: Time window in seconds for counting messages.
# For example, with message_rate_limit=20 and message_rate_limit_window=10,
# players can send up to 20 messages every 10 seconds.
# Default: 10 seconds
message_rate_limit_window = 10

# Modcall cooldown: Minimum number of seconds a user must wait between modcalls.
# Set to 0 to disable the cooldown (allow unlimited modcalls).
# Example: setting this to 60 means a user can only send one modcall per 60 seconds.
# Default: 0 (disabled)
modcall_cooldown = 0

# Connection rate limiting: Maximum number of new connections an IP can make within the
# connection rate limit window. Connections that exceed this limit are immediately rejected
# before the WebSocket handshake, preventing floods from crashing the server.
# Set to 0 to disable connection rate limiting.
# Default: 10 connections
connection_rate_limit = 10

# Connection rate limiting: Time window in seconds for counting new connections per IP.
# For example, with connection_rate_limit=10 and connection_rate_limit_window=10,
# an IP may open at most 10 new connections every 10 seconds.
# Default: 10 seconds
connection_rate_limit_window = 10

# Whether to automatically ban IPs that are repeatedly rejected by the connection rate limit.
# When an IP has its connection rejected more than conn_flood_autoban_threshold times
# (within the same connection-rate window), it is banned for default_ban_duration.
# This stops endless reconnection floods from wasting server resources.
# Set to false to disable. Default: true
conn_flood_autoban = true

# Number of connection rejections (due to the connection rate limit) before an IP is
# automatically banned. For example, with the default value of 6, an IP that has its
# connection rejected 6 or more times will be auto-banned.
# Only takes effect when conn_flood_autoban = true.
# Default: 6
conn_flood_autoban_threshold = 6

# Whether to automatically ban IPs that exceed the raw packet rate limit.
# Raw packet flooding (sending hundreds of packets per second) is a clear bot/DDoS
# indicator. When enabled, such IPs are banned for default_ban_duration.
# For connection-level flood banning see conn_flood_autoban above.
# Default: true
packet_flood_autoban = true

# Raw packet rate limiting: Maximum number of AO2 protocol packets (of any type) a single
# client connection may send within the raw packet rate limit window.
# Unlike message_rate_limit (which only counts IC/OOC/music packets), this counts EVERY
# incoming packet — MS, CC, CH, PU, HP, RT, unknown headers, etc.
#
# Tuning rationale:
#   Legitimate AO2 client maximum — join handshake (HI+ID+askchaa+RC+RM+RD = 6 packets,
#   each gated by a server reply) plus simultaneous gameplay actions is at most ~12 packets
#   in any 2-second window under the most frantic normal use.
#   Bot/flooder minimum to be meaningful is 30+ packets per second.
#   The default of 20 per 2 seconds (10/s average) sits safely between those two extremes:
#   no legitimate player will ever reach it; any flooding bot is caught within 2 seconds.
#
# Set to 0 to disable raw packet rate limiting.
# Default: 20 packets
raw_packet_rate_limit = 20

# Raw packet rate limiting: Time window in seconds for counting all incoming packets.
# Decimal values are supported, e.g. 0.05 means a 50-millisecond window.
# For example, with raw_packet_rate_limit=10 and raw_packet_rate_limit_window=0.05,
# a connection that sends more than 10 packets in 50ms is banned.
# Default: 2 seconds
raw_packet_rate_limit_window = 2

# OOC rate limiting: Maximum number of OOC messages a player can send within the OOC rate limit window.
# OOC packets that exceed this limit are silently dropped, preventing OOC flooding.
# Set to 0 to disable OOC rate limiting.
# Default: 4 messages
ooc_rate_limit = 4

# OOC rate limiting: Time window in seconds for counting OOC messages.
# For example, with ooc_rate_limit=4 and ooc_rate_limit_window=1,
# players can send at most 4 OOC messages per second.
# Default: 1 second
ooc_rate_limit_window = 1

# Ping rate limiting: Maximum number of ping (CH) packets an IP can send within the ping rate limit window.
# Ping packets that exceed this limit are silently dropped, preventing ping flooding even from new connections.
# Set to 0 to disable ping rate limiting.
# Default: 10 pings
ping_rate_limit = 10

# Ping rate limiting: Time window in seconds for counting ping packets.
# For example, with ping_rate_limit=10 and ping_rate_limit_window=5,
# an IP may send at most 10 pings every 5 seconds.
# Default: 5 seconds
ping_rate_limit_window = 5

# New IPID OOC cooldown: Number of seconds a brand-new IPID (one that has never connected
# to this server session before) must wait before being allowed to send OOC chat messages.
# Commands (starting with /) are exempt from this cooldown.
# Set to 0 to disable. Default: 10 seconds.
new_ipid_ooc_cooldown = 10

# New IPID modcall cooldown: Number of seconds a brand-new IPID must wait before being
# allowed to send a modcall. This prevents throwaway connections from flooding moderators.
# Set to 0 to disable. Default: 60 seconds.
new_ipid_modcall_cooldown = 60

# Global new-IP rate limit: Maximum number of distinct new IPs (IPIDs that have never
# connected to this server session before) that can be accepted within the time window below.
# When this limit is reached, connections from additional unknown IPs are immediately closed
# until the window clears, protecting the server against floods using many unique source IPs.
# IPs that have already connected at least once (returning players) are NEVER affected by
# this limit. Set to 0 to disable. Default: 5 unique IPs.
global_new_ip_rate_limit = 5

# Global new-IP rate limit: Time window in seconds for counting new unique IPs.
# For example, with global_new_ip_rate_limit=5 and global_new_ip_rate_limit_window=10,
# the server accepts at most 5 brand-new IP addresses per 10 seconds.
# A short window (10 s) catches fast bot bursts (dozens of unique IPs in milliseconds)
# while still allowing a sustained rate of 30 new players per minute — far above any
# legitimate server's intake rate. Returning players are unaffected.
# Default: 10 seconds.
global_new_ip_rate_limit_window = 10

# IP database retention: Number of days after which an IP that has not reconnected
# is removed from the known-IP database. Removing stale IPs keeps the database lean
# and ensures long-inactive addresses are subject to new-connection cooldowns if they
# ever reconnect. IPs are also removed immediately whenever they are banned, so that
# a re-connecting player whose ban has expired is treated as a new IP again.
# Set to 0 to disable automatic pruning (IPs are kept forever).
# Default: 0 (disabled)
ip_retention_days = 0

# Sets the allowed origin hostname for WebSocket (WebAO) connections.
# Only connections whose Origin header hostname matches this value will be accepted.
# This is matched against the hostname portion of the Origin header (e.g. "web.aceattorneyonline.com"
# matches an Origin of "https://web.aceattorneyonline.com"). Glob patterns are supported.
# Set to "*" to allow connections from any origin (disables enforcement).
# Default: "web.aceattorneyonline.com"
webao_allowed_origin = "web.aceattorneyonline.com"

# AutoMod: Automatically bans any player who sends a message (IC or OOC) that contains
# a word from the banned-word list. The ban is permanent and silent — no entry is posted
# to the punishment webhook, keeping your moderation channel free from noise.
# Set to true to enable. Default: false.
automod_enabled = false

# Path to the banned-words file, relative to the config directory.
# Each non-empty line is one word or phrase (case-insensitive). Lines beginning
# with '#' are treated as comments. Default: "banned_words.txt".
automod_wordlist = "banned_words.txt"

# Action to take when the AutoMod detects a banned word in a player's message.
# Accepted values:
#   "ban"     — Permanently ban the player (default).
#   "kick"    — Kick the player from the server without a ban.
#   "mute"    — Permanently mute the player's IC and OOC chat.
#   "torment" — Add the player's IPID to a torment list. Tormented players are
#               randomly disconnected every 30–60 seconds every time they connect,
#               making the experience deeply unpleasant without a hard ban.
#               Use /untorment <ipid> to remove an IPID from the torment list.
automod_action = "ban"

# /randomsong cooldown: Minimum number of seconds a CM must wait between uses of /randomsong.
# Set to 0 to disable the cooldown (allow unlimited uses).
# Default: 5 seconds.
random_song_cooldown = 5

# /botban playtime threshold: Minimum total playtime in seconds a spectator must have
# accumulated (across all past sessions plus the current session) to be exempt from /botban.
# Spectators whose total playtime is below this value will be permanently banned by /botban.
# Raise this value to catch longer-lived bots; lower it to be more conservative.
# Default: 120 seconds (2 minutes).
botban_playtime_threshold = 120

# IPHub API key for VPN/proxy detection.
# When set, moderators can use /firewall on|off to enable or disable IP screening.
# While the firewall is active, every new IP (not previously known to the server) is
# checked against the IPHub API (https://iphub.info). If the IP is classified as a
# VPN or non-residential proxy (block=1), the connection is immediately rejected.
# IPs that are already known to the server (from previous connections) are never
# sent to the API, and each unique IP is only checked once per server session to
# respect the free-tier limit of 1 000 requests/day.
# Leave blank to disable IPHub integration entirely (the /firewall command will
# still exist but will report that no API key is configured).
iphub_api_key = ""

# ─────────────────────────────────────────────────────────────────────────────
# Casino & Player Account System
# ─────────────────────────────────────────────────────────────────────────────
# Set to true to enable the Nyathena casino mini-games (blackjack, poker, slots,
# roulette, baccarat, craps, crash, mines, keno, prize wheel) and the player
# account system (/register, /account, /chips leaderboard).
#
# When set to false:
#   • All casino game commands are disabled server-wide and respond with a
#     "not enabled on this server" message.
#   • /register, /account, /chips, /casino, /casinoenable, and /casinoset are
#     also hidden from /help and blocked.
#   • Existing moderator/admin accounts in the database are unaffected —
#     /login and /logout continue to work normally.
#   • All existing chip balances and player account data in the database are
#     preserved and will be fully accessible if you re-enable this setting later.
#
# Default: false
enable_casino = false

# Require players to complete a random captcha when registering a new account.
# When true, /register issues a one-time token that the player must echo back
# with /captcha <token> before the account is created. This prevents automated
# bulk registration from a single session.
# Set to false to allow immediate registration without any captcha step.
# Default: true
register_captcha = true

# ─── Community Voting ────────────────────────────────────────────────────────

# Enable the community moderation vote system.
# When enabled, players can use /cvote to request moderation actions against
# other players. Once enough votes are collected (vote_threshold), moderators
# are notified and can accept or reject the vote with /cvote accept|reject.
# Moderators always have final say — no action is taken automatically.
# Default: false
enable_community_vote = false

# Number of unique player votes required to pass a community vote.
# Votes are de-duplicated by IPID so each IP address can only contribute one vote.
# Default: 3
vote_threshold = 3

# Seconds a community vote remains active before it expires.
# This timer applies both to votes collecting signatures and to passed votes
# waiting for a moderator response.
# Default: 120
vote_duration = 120

# Which moderation actions players are allowed to vote on.
# Valid values: "kick", "mute", "ban"
# Keep this list conservative — bans in particular should be used carefully.
# Default: ["kick"]
vote_actions = [ "kick" ]

# Duration in seconds of a community-vote mute.
# Only relevant when "mute" is included in vote_actions.
# Default: 300 (5 minutes)
vote_mute_duration = 300

# ─── Typing Race ────────────────────────────────────────────────────────────

# Custom phrases for the /typingrace minigame.
# If left empty, the built-in phrase pool (30+ phrases) is used.
# Each phrase should be at least 4 words for a meaningful WPS reading.
# Example:
#   typing_race_phrases = [
#     "the quick brown fox jumps over the lazy dog",
#     "objection your honour the witness is lying",
#   ]
typing_race_phrases = []

# ─── Daily Newspaper ────────────────────────────────────────────────────────

# Enable the auto-generated IC newspaper that is broadcast at a fixed interval.
# Default: false
enable_newspaper = false

# How often the newspaper is broadcast.
# Accepts duration strings such as "24h", "12h", "6h".
# Default: "24h"
newspaper_interval = "24h"

# Which sections to include in each newspaper issue, in display order.
# Available sections:
#   chip_leaderboard   — Top 5 players by chip balance
#   playtime_top       — Top 5 players by playtime
#   unscramble_top     — Top 5 unscramble champions
#   recent_bans        — 5 most recent ban summaries (no IDs shown)
#   server_stats       — Current player count and area count
#   weather            — Random flavour weather forecast
#   horoscope          — Random daily horoscope sign + message
#   word_of_the_day    — Legal/courtroom vocabulary entry
#   casino             — Top 3 chip holders (casino feature only)
#   area_highlight     — Most populated area spotlight
#   job_market         — Top 3 job earners
#   punishment_report  — Count of currently punished players
#   tip_of_the_day     — Courtroom/RP tip
#   classifieds        — Humorous classified ad
#   holiday_greeting   — Random seasonal greeting
# Default (used when this list is empty):
#   server_stats, weather, horoscope, tip_of_the_day, chip_leaderboard, area_highlight
newspaper_sections = []

# ─── Goroutine Pool ─────────────────────────────────────────────────────────

# Maximum number of concurrent connection-handling goroutines.
# When the server receives more simultaneous connections than this limit, new
# connections wait for a slot rather than spawning unbounded goroutines.
# Set to 0 (the default) to disable the pool and preserve unlimited behaviour.
# A value of 2× max_players is a reasonable starting point.
# Default: 0 (disabled)
max_connection_goroutines = 0

[Logging]
# Sets the number of actions (IC chat messages, OOC chat messages, judge actions, etc.) each area should store.
# When a user calls a mod, this buffer will be flushed to a report file for review.
log_buffer_size = 150

# Sets the log level. Events of lower levels will not be logged.
# Valid levels: debug, info, warning, error, fatal
log_level = "info"

# Sets the path to the log directory.
# This directory will be used for storing report files, the server audit log, and the server log.
log_directory = "logs"

# Sets which log methods to use.
# Methods: stdout, log_file
log_methods = [ "stdout" ]

# Enable per-area folder logging with daily rotation.
# When enabled, each area gets its own folder under logs/ with daily log files.
# Format: logs/AreaName/AreaName-YYYY-MM-DD.txt
# Each log line includes: [HH:MM:SS] | ACTION | CHARACTER | IPID | HDID | SHOWNAME | OOC_NAME | MESSAGE
enable_area_logging = false

# Enable network packet logging.
# When enabled, every incoming and outgoing packet is written to logs/network.log with
# a timestamp, direction (RECV/SEND), IPID, HDID, and the raw packet content.
# Useful for incident review and crash analysis. Generates significant log volume.
# Default: false
enable_network_logging = false

[MasterServer]

# Whether or not to advertise your server on the master server, which will make it discoverable by players.
# If you want to keep your server private, set this as false.
advertise = false

# The address of the master server. You shouldn't change this unless you know what you're doing.
addr = "https://servers.aceattorneyonline.com/servers"

[Discord]

# Discord bot token. Leave blank to disable the Discord bot.
# Create a bot at https://discord.com/developers/applications and copy the token here.
bot_token = ""

# The ID of the Discord server (guild) where the bot should register slash commands.
# Right-click your server name in Discord and select "Copy Server ID" (requires Developer Mode).
guild_id = ""

# The ID of the Discord role that is allowed to use moderation commands.
# Right-click the role in Server Settings > Roles and select "Copy Role ID".
# Leave blank to allow all users to run commands (not recommended).
mod_role_id = ""
